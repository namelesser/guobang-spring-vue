server:
  port: ${SERVER_PORT:8000}
  servlet:
    session:
      tracking-modes: cookie

spring:
  application:
    name: guobang-transport
  datasource:
    url: jdbc:postgresql://${PG_HOST:127.0.0.1}:${PG_PORT:5432}/${PG_DATABASE:transport}?sslmode=disable
    username: ${PG_USER:transport}
    password: ${PG_PASSWORD:}
    hikari:
      maximum-pool-size: ${PG_POOL_MAX:30}
      minimum-idle: 2
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MAX_IMAGE_UPLOAD_BYTES:15MB}
      max-request-size: ${MAX_IMAGE_UPLOAD_BYTES:15MB}

logging:
  level:
    root: INFO
    com.guobang.transport: INFO

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

ocr:
  paddle:
    api-url: ${PADDLE_API_URL:https://paddleocr.aistudio-app.com/api/v2/ocr/jobs}
    api-token: ${PADDLE_API_TOKEN:}
    model: ${PADDLE_MODEL:PaddleOCR-VL-1.6}
    timeout-sec: ${PADDLE_TIMEOUT_SEC:900}
    poll-interval-sec: ${PADDLE_POLL_INTERVAL_SEC:4}
  baidu:
    api-key: ${BAIDU_API_KEY:}
    secret-key: ${BAIDU_SECRET_KEY:}
